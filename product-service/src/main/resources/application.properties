spring.application.name=product-service
server.port=8000

spring.datasource.url=jdbc:postgresql://localhost/db_product
spring.datasource.username=postgres
spring.datasource.password=123

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.locations=classpath:db_migration

#Self Registration Pattern
eureka.client.service-url.default-zone=http://localhost:8761/eureka
#Ideal para ambiente containerizados
eureka.instance.prefer-ip-address=true
#Personalizar o id de cada inst\u00E2ncia
eureka.instance.instance-id=${spring.application.name}:${server.port}
#Indicar que o Service Registry deve validar a sa\u00FAde do servi\u00E7o atrav\u00E9s do actuator, e n\u00E3o somente Heartbeat
# Opcional - Valor Default = TRUE
eureka.client.healthcheck.enabled=true

#Configura\u00E7\u00E3o m\u00EDnima para atua\u00E7\u00E3o com o Service Registry de forma consciente
management.endpoints.web.exposure.include=health,info,metrics,circuit-breakers,circuit-breaker-events
#ATEN\u00C7\u00C3O: Cuidado a expor esses dados
#Exibir todas as informa\u00E7\u00F5es de sa\u00FAde da aplica\u00E7\u00E3o
management.endpoint.health.show-details=always
#Exibir informa\u00E7\u00F5es no endpoint /actuator/info
management.info.env.enabled=true

#Personaliza\u00E7\u00E3o de ifnorma\u00E7\u00F5es do endpoint /actuator/info
info.app.name=${spring.application.name}
info.app.description=Product Microservice - manages products and pricing with resilience patterns
info.app.autor=Pedro Henrique Renosto
#Personaliza\u00E7\u00E3o de Metadatas para o Eureka Service Registry
eureka.instance.metadata-map.github.repo=PedroHenriqueRen11/microservices-resilience

#Definir a uliza\u00E7\u00E3o das Probes Liveness e Readiness + exibi\u00E7\u00E3o de de informa\u00E7\u00F5es de componentes diversos
# Opcional: Padr\u00E3o j\u00E1 \u00E9 TRUE
management.endpoint.health.probes.enabled=true
management.health.defaults.enabled=true

# RESILIENCE PATTERNS - TIMEOUT
# Timeout para estabelecer conex\u00E3o (1 segundo)
spring.cloud.openfeign.client.config.currency-service.connect-timeout=1000
# Timeout para processar e receber os dados (3 segundo)
spring.cloud.openfeign.client.config.currency-service.read-timeout=3000

# RESILIENCE PATTERNS - RETRY
# Quantidade m\u00E1xima de tentativas (primeira  + 2 tentativas)
resilience4j.retry.instances.currency-service.max-attempts=3
# Tempo de espera inicial entre as tentativas
resilience4j.retry.instances.currency-service.wait-duration=500ms
# Ativa o recuo exponencial (Exponential Backoff)
resilience4j.retry.instances.currency-service.enable-exponential-backoff=true
# Multiplicador do tempo de espera (Tentativa 1: 500ms -> Tentativa 2: 500 x 2 = 1000ms)
resilience4j.retry.instances.currency-service.exponential-backoff-multiplier=2.0
# Ativa varia\u00E7\u00E3o aleat\u00F3rio do tempo de espera (Jitter)
resilience4j.retry.instances.currency-service.enable-randomized-wait=true
# Fator do Jitter (Aplica uma fluta\u00E7\u00E3o aleat\u00F3ria de at\u00E9 50% para mais ou menos)
resilience4j.retry.instances.currency-service.randomized-wait-factor=0.5

# Regra de Exce\u00E7\u00E3o: IGNORAR/RETENTAR (um ou outro)
# IGNORAR (Evita desperd\u00EDcio de recursos em falhas do cliente)
# Ignora qualquer erro HTTP da fam\u00EDlia 4xx (400, 401, 403, 404, etc.)
resilience4j.retry.instances.currency-service.ignore-exceptions[0]=feign.FeignException\$FeignClientException

# RETENTAR (Foca apenas em falhas transit\u00F3rias e instabilidades)
# Retenta em caso de timeout controlado pelo OpenFeign
resilience4j.retry.instances.currency-service.retry-exceptions[0]=feign.RetryableException
# Retenta em caso de queda dr\u00E1stica de socket/rede pura
resilience4j.retry.instances.currency-service.retry-exceptions[1]=java.net.SocketTimeoutException
# Retenta em caso de erros HTTP da fam\u00EDlia 5xx vindo do servidor (500, 502, 503, 504, etc.)
resilience4j.retry.instances.currency-service.retry-exceptions[2]=feign.FeignException\$FeignServerException

# RESILIENCE PATTERNS - CACHING
#Configura o tipo de cache. Para cache em mem\u00F3ria o caffeine \u00E9 considerado com melhor desempenho
spring.cache.type=caffeine
#Configura\u00E7\u00F5es do cache: 500 objetos no m\u00E1ximo e com um tempo de expira\u00E7\u00E3o de 15 segundos
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=15s

# RESILIENCE PATTERNS - CIRCUIT BREAKER
#Habilita o Circuit Breaker do Resilience4j no OpenFeign
spring.cloud.openfeign.circuitbreaker.enabled=true
# Habilita o indicador de saude para esta instancia de circuit breaker
resilience4j.circuitbreaker.instances.CurrencyClientgetCurrencyStringString.register-health-indicator=true
# Numero de chamadas na janela deslizante para calcular a taxa de falhas
resilience4j.circuitbreaker.instances.CurrencyClientgetCurrencyStringString.slidingWindowSize=10
# Numero minimo de chamadas antes de calcular a taxa de falhas
resilience4j.circuitbreaker.instances.CurrencyClientgetCurrencyStringString.minimumNumberOfCalls=5
# Percentual maximo de falhas permitido antes de abrir o circuito
resilience4j.circuitbreaker.instances.CurrencyClientgetCurrencyStringString.failureRateThreshold=50
# Tempo que o circuito permanece aberto antes de ir para meio-aberto
resilience4j.circuitbreaker.instances.CurrencyClientgetCurrencyStringString.waitDurationInOpenState=30s
# Numero de chamadas permitidas no estado meio-aberto para testar
resilience4j.circuitbreaker.instances.CurrencyClientgetCurrencyStringString.permittedNumberOfCallsInHalfOpenState=3
# Ativa a transicao automatica de aberto para meio-aberto sem esperar chamada
resilience4j.circuitbreaker.instances.CurrencyClientgetCurrencyStringString.automaticTransitionFromOpenToHalfOpenEnabled=true

#Habilita o actuator monitorar a sa\u00FAde em conjunto com o circuit breaker
management.health.circuitbreakers.enabled=true


# Faz o OpenFeign usar o nome do microservi\u00E7o como ID ... dessa forma sincroniza
# o retry com o circuit breaker
spring.cloud.openfeign.circuitbreaker.group.enabled=true

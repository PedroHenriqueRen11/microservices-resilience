spring.application.name=discovery-service
server.port=8761

eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

management.endpoints.web.exposure.include=health,info,metrics,circuit-breakers,circuit-breaker-events
management.endpoint.health.show-details=always
management.info.env.enabled=true
management.endpoint.health.probes.enabled=true
management.health.defaults.enabled=true

info.app.name=${spring.application.name}
info.app.description=Discovery Service - Eureka Service Registry
info.app.autor=Pedro Henrique Renosto
eureka.instance.metadata-map.github.repo=PedroHenriqueRen11/microservices-resilience
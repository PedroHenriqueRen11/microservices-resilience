spring.application.name=currency-service
server.port=8100

## CONFIG DB CONNECTION
spring.datasource.url=jdbc:postgresql://localhost:5432/db_currency
spring.datasource.username=postgres
spring.datasource.password=123

#In production
spring.jpa.hibernate.ddl-auto=none

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.locations=classpath:/db_migration

# Self Registration Pattern
eureka.client.service-url.default-zone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}
eureka.client.healthcheck.enabled=true

# Health Check API Pattern
management.endpoints.web.exposure.include=health,info,metrics,circuit-breakers,circuit-breaker-events
management.endpoint.health.show-details=always
management.info.env.enabled=true
management.endpoint.health.probes.enabled=true
management.health.defaults.enabled=true

# Informa\u00E7\u00F5es do /actuator/info
info.app.name=${spring.application.name}
info.app.description=Currency Microservice - handles currency conversion and BCB integration
info.app.autor=Pedro Henrique Renosto

# Metadata no Eureka
eureka.instance.metadata-map.github.repo=PedroHenriqueRen11/microservices-resilience

# RESILIENCE PATTERNS - TIMEOUT (BCB Client)
spring.cloud.openfeign.client.config.bcb-client.connect-timeout=1000
spring.cloud.openfeign.client.config.bcb-client.read-timeout=3000

# RESILIENCE PATTERNS - RETRY (BCB Client)
resilience4j.retry.instances.bcb-client.max-attempts=3
resilience4j.retry.instances.bcb-client.wait-duration=500ms
resilience4j.retry.instances.bcb-client.enable-exponential-backoff=true
resilience4j.retry.instances.bcb-client.exponential-backoff-multiplier=2.0
resilience4j.retry.instances.bcb-client.enable-randomized-wait=true
resilience4j.retry.instances.bcb-client.randomized-wait-factor=0.5
resilience4j.retry.instances.bcb-client.ignore-exceptions[0]=feign.FeignException$FeignClientException
resilience4j.retry.instances.bcb-client.retry-exceptions[0]=feign.RetryableException
resilience4j.retry.instances.bcb-client.retry-exceptions[1]=java.net.SocketTimeoutException
resilience4j.retry.instances.bcb-client.retry-exceptions[2]=feign.FeignException$FeignServerException

# RESILIENCE PATTERNS - CACHE (BCB Client)
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=15s

# RESILIENCE PATTERNS - CIRCUIT BREAKER (BCB Client)
spring.cloud.openfeign.circuitbreaker.enabled=true
resilience4j.circuitbreaker.instances.BCBClientgetCotacaoStringStringString.register-health-indicator=true
resilience4j.circuitbreaker.instances.BCBClientgetCotacaoStringStringString.slidingWindowSize=10
resilience4j.circuitbreaker.instances.BCBClientgetCotacaoStringStringString.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.BCBClientgetCotacaoStringStringString.failureRateThreshold=50
resilience4j.circuitbreaker.instances.BCBClientgetCotacaoStringStringString.waitDurationInOpenState=30s
resilience4j.circuitbreaker.instances.BCBClientgetCotacaoStringStringString.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.BCBClientgetCotacaoStringStringString.automaticTransitionFromOpenToHalfOpenEnabled=true
management.health.circuitbreakers.enabled=true
spring.cloud.openfeign.circuitbreaker.group.enabled=true